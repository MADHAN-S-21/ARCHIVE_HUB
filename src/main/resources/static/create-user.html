<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New User | ArchiveHub</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .create-user-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            animation: slideInUp 0.8s var(--transition);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        .form-card {
            padding: 3rem;
        }

        .form-header {
            margin-bottom: 2.5rem;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-header p {
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-shield-check-fill" style="color: var(--primary-color);"></i>
                    <span>ArchiveHub</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="files.html" class="nav-link">
                            <i class="ri-folder-3-line"></i>
                            <span>My Files</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="collections.html" class="nav-link">
                            <i class="ri-heart-line"></i>
                            <span>Collections</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="admin.html" class="nav-link active">
                            <i class="ri-shield-user-line"></i>
                            <span>Admin Panel</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="profile.html" class="nav-link">
                            <i class="ri-user-3-line"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin-top: auto;">
                        <a href="#" id="logout-btn" class="nav-link">
                            <i class="ri-logout-box-r-line"></i>
                            <span>Sign Out</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <span class="online-dot"></span>
                    </div>
                    <div class="user-info">
                        <h4>Loading...</h4>
                        <p>...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search system...">
                </div>

                <div class="header-actions">
                    <button class="icon-btn" title="Notifications">
                        <i class="ri-notification-3-line"></i>
                    </button>
                    <button class="icon-btn" title="Toggle Theme">
                        <i class="ri-moon-line"></i>
                    </button>
                    <div style="width: 1px; height: 24px; background: var(--border-light); margin: 0 0.5rem;"></div>
                </div>
            </header>

            <div class="page-content">
                <div class="create-user-container">
                    <a href="admin.html" class="back-link">
                        <i class="ri-arrow-left-line"></i>
                        <span>Back to Admin Panel</span>
                    </a>

                    <div class="form-card glass-container">
                        <div class="form-header">
                            <h1>Create New User</h1>
                            <p>Fill in the details below to add a new member to the system.</p>
                        </div>

                        <form id="create-user-form">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="fullname" name="fullname" required placeholder="e.g. John Doe">
                            </div>

                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="email" name="email" required
                                    placeholder="e.g. john@example.com">
                            </div>

                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="username" name="username" required placeholder="e.g. johndoe">
                            </div>

                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="password" name="password" required
                                    placeholder="Min. 6 characters">
                            </div>

                            <div class="form-group">
                                <label>Role</label>
                                <select id="role" name="role" required>
                                    <option value="STUDENT">User</option>
                                    <option value="FACULTY">Faculty</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>

                            <div id="student-fields" style="display: block;">
                                <div class="form-group">
                                    <label>Roll Number</label>
                                    <input type="text" id="rollNumber" name="rollNumber" placeholder="e.g. 21CS001">
                                </div>
                                <div class="form-group">
                                    <label>Department</label>
                                    <input type="text" id="department" name="department" placeholder="e.g. Computer Science">
                                </div>
                            </div>

                            <div id="faculty-fields" style="display: none;">
                                <div class="form-group">
                                    <label>Faculty ID</label>
                                    <input type="text" id="facultyId" name="facultyId" placeholder="e.g. FAC001">
                                </div>
                            </div>

                            <button type="submit" class="btn-primary btn-submit" id="submit-btn">
                                <i class="ri-user-add-line"></i>
                                <span>Create User</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/create-user.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
