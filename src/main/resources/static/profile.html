<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ArchiveHub</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-shield-check-fill" style="color: var(--primary-color);"></i>
                    <span>ArchiveHub</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <i class="ri-dashboard-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="files.html" class="nav-link">
                            <i class="ri-folder-3-line"></i>
                            <span>My Files</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="collections.html" class="nav-link">
                            <i class="ri-heart-line"></i>
                            <span>Collections</span>
                        </a>
                    </li>
                    <li class="nav-item faculty-only" style="display: none;">
                        <a href="faculty-docs.html" class="nav-link">
                            <i class="ri-file-user-line"></i>
                            <span>Personal Docs</span>
                        </a>
                    </li>
                    <li class="nav-item faculty-only" style="display: none;">
                        <a href="faculty-stats.html" class="nav-link">
                            <i class="ri-bar-chart-box-line"></i>
                            <span>Academic Stats</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="admin.html" class="nav-link">
                            <i class="ri-shield-user-line"></i>
                            <span>Admin Panel</span>
                        </a>
                    </li>
                    <li class="nav-item approvals-link" style="display: none;">
                        <a href="approvals.html" class="nav-link">
                            <i class="ri-user-follow-line"></i>
                            <span>Approvals</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="profile.html" class="nav-link active">
                            <i class="ri-user-3-line"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin-top: auto;">
                        <a href="#" id="logout-btn" class="nav-link">
                            <i class="ri-logout-box-r-line"></i>
                            <span>Sign Out</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">MD</div>
                    <div class="user-info">
                        <h4>Madhan</h4>
                        <p>madhan@gmail.com</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search profile...">
                </div>

                <div class="header-actions">
                    <button class="icon-btn">
                        <i class="ri-notification-3-line"></i>
                    </button>
                    <button class="icon-btn">
                        <i class="ri-moon-line"></i>
                    </button>
                    <a href="new-entry.html" class="btn-primary">
                        <i class="ri-upload-cloud-2-line"></i>
                        <span>Upload</span>
                    </a>
                </div>
            </header>

            <!-- Profile Content -->
            <div class="page-content">
                <div class="page-header">
                    <div class="page-title">
                        <h1>Profile</h1>
                        <p>Manage your account preferences and personal information.</p>
                    </div>
                </div>

                <div style="max-width: 800px;">
                    <!-- Student Profile Section -->
                    <div
                        style="background-color: var(--surface-color); padding: 2rem; border-radius: 1rem; border: 1px solid var(--border-color); margin-bottom: 2rem; box-shadow: var(--shadow-sm);">
                        <div class="section-title">
                            <h2>Profile Information</h2>
                            <button id="save-profile-btn" class="btn-primary">Save Changes</button>
                        </div>

                        <div style="display: flex; gap: 2rem; align-items: start; margin-top: 1.5rem;">
                            <div style="flex-shrink: 0; text-align: center;">
                                <div id="profile-avatar-large"
                                    style="width: 100px; height: 100px; background-color: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 600; color: var(--text-muted); margin-bottom: 1rem; overflow: hidden; background-size: cover; background-position: center;">
                                    MD</div>
                                <button id="change-photo-btn"
                                    style="color: var(--primary); background: none; border: none; font-weight: 500; cursor: pointer;">Change
                                    Photo</button>
                            </div>

                            <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                    <label style="font-weight: 500; font-size: 0.875rem;">First Name</label>
                                    <input type="text" id="profile-firstname" value="">
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                    <label style="font-weight: 500; font-size: 0.875rem;">Last Name</label>
                                    <input type="text" id="profile-lastname" value="">
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.5rem; grid-column: span 2;">
                                    <label style="font-weight: 500; font-size: 0.875rem;">Email Address</label>
                                    <input type="email" id="profile-email" value="" readonly
                                        style="color: var(--text-muted); cursor: not-allowed;">
                                </div>

                                <!-- Student Specific Fields -->
                                <div id="student-fields" style="display: none; grid-template-columns: 1fr 1fr; gap: 1.5rem; grid-column: span 2;">
                                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                        <label style="font-weight: 500; font-size: 0.875rem;">Roll Number</label>
                                        <input type="text" id="profile-rollnumber" placeholder="Enter roll number">
                                    </div>
                                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                        <label style="font-weight: 500; font-size: 0.875rem;">Department</label>
                                        <input type="text" id="profile-department" placeholder="Enter department">
                                    </div>
                                </div>

                                <!-- Faculty Specific Fields -->
                                <div id="faculty-fields" style="display: none; grid-template-columns: 1fr; gap: 1.5rem; grid-column: span 2;">
                                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                        <label style="font-weight: 500; font-size: 0.875rem;">Faculty ID</label>
                                        <input type="text" id="profile-facultyid" placeholder="Enter faculty ID">
                                    </div>
                                </div>

                                <div style="display: flex; flex-direction: column; gap: 0.5rem; grid-column: span 2;">
                                    <label style="font-weight: 500; font-size: 0.875rem;">Bio</label>
                                    <textarea id="profile-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>



                    <input type="file" id="profile-photo-input" accept="image/*" style="display: none;">
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
