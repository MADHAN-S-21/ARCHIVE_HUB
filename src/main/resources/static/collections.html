<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | ArchiveHub</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="ri-shield-check-fill" style="color: var(--primary-color);"></i>
                    <span>ArchiveHub</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <i class="ri-dashboard-line"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="files.html" class="nav-link">
                            <i class="ri-folder-3-line"></i>
                            <span>My Files</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="collections.html" class="nav-link active">
                            <i class="ri-heart-line"></i>
                            <span>Collections</span>
                        </a>
                    </li>
                    <li class="nav-item faculty-only" style="display: none;">
                        <a href="faculty-docs.html" class="nav-link">
                            <i class="ri-file-user-line"></i>
                            <span>Personal Docs</span>
                        </a>
                    </li>
                    <li class="nav-item faculty-only" style="display: none;">
                        <a href="faculty-stats.html" class="nav-link">
                            <i class="ri-bar-chart-box-line"></i>
                            <span>Academic Stats</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="admin.html" class="nav-link">
                            <i class="ri-shield-user-line"></i>
                            <span>Admin Panel</span>
                        </a>
                    </li>
                    <li class="nav-item approvals-link" style="display: none;">
                        <a href="approvals.html" class="nav-link">
                            <i class="ri-user-follow-line"></i>
                            <span>Approvals</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="profile.html" class="nav-link">
                            <i class="ri-user-3-line"></i>
                            <span>Profile</span>
                        </a>
                    </li>
                    <li class="nav-item" style="margin-top: auto;">
                        <a href="#" id="logout-btn" class="nav-link">
                            <i class="ri-logout-box-r-line"></i>
                            <span>Sign Out</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <span class="online-dot"></span>
                    </div>
                    <div class="user-info">
                        <h4>Loading...</h4>
                        <p>...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search archives...">
                </div>

                <div class="header-actions">
                    <button class="icon-btn">
                        <i class="ri-notification-3-line"></i>
                    </button>
                    <button class="icon-btn">
                        <i class="ri-moon-line"></i>
                    </button>
                    <a href="new-entry.html" class="btn-primary">
                        <i class="ri-upload-cloud-2-line"></i>
                        <span>Upload</span>
                    </a>
                </div>
            </header>

            <!-- Collections Content -->
            <div class="page-content">
                <div class="page-header">
                    <div class="page-title">
                        <h1>Collections</h1>
                        <p>Organize your archives into meaningful albums and folders.</p>
                    </div>
                </div>

                <div class="collections-actions" style="margin-bottom: 2rem; display: flex; justify-content: flex-end;">
                    <button class="btn-primary" onclick="openCreateCollectionModal()">
                        <i class="ri-add-line"></i>
                        <span>Create Collection</span>
                    </button>
                </div>

                <div class="collections-grid"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;">
                    <!-- Collections will be loaded here -->
                </div>

                <!-- Create Collection Modal -->
                <div id="createCollectionModal" class="modal">
                    <div class="modal-content auth-card-clean" style="max-width: 440px; padding: 2.5rem;">
                        <h2 style="margin-bottom: 2rem; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em;">
                            New Collection</h2>
                        <form id="createCollectionForm">
                            <div class="form-group-clean">
                                <label
                                    style="display: block; margin-bottom: 0.7rem; font-weight: 600; font-size: 0.9rem;">Collection
                                    Name</label>
                                <input type="text" id="collectionName" class="form-control-clean"
                                    placeholder="e.g. Travel 2024" required>
                            </div>
                            <div class="form-group-clean">
                                <label
                                    style="display: block; margin-bottom: 0.7rem; font-weight: 600; font-size: 0.9rem;">Description</label>
                                <textarea id="collectionDesc" class="form-control-clean" rows="3"
                                    placeholder="What's this collection about?"></textarea>
                            </div>
                            <div class="form-actions"
                                style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                                <button type="button" class="icon-btn" onclick="closeCreateCollectionModal()"
                                    style="width: auto; height: auto; padding: 0.8rem 1.5rem; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 600;">Cancel</button>
                                <button type="submit" class="btn-primary"
                                    style="padding: 0.8rem 2rem; font-size: 0.9rem;">Create</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
