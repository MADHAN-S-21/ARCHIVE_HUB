<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ArchiveHub</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="auth-body-minimal">

    <div class="auth-card-clean" style="max-width: 500px;">
        <div class="auth-header-clean">
            <h1 class="auth-title-clean">Create account</h1>
        </div>

        <form id="signup-form">
            <div class="form-group-clean">
                <input type="text" id="fullname" placeholder="Full name" required>
            </div>

            <div class="form-group-clean">
                <input type="email" id="email" placeholder="Email address" required>
            </div>

            <div class="form-group-clean">
                <select id="role" name="role" required style="width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-light); border-radius: 8px; font-size: 0.95rem; background: var(--bg-main); color: var(--text-main);">
                    <option value="STUDENT">Student</option>
                    <option value="FACULTY">Faculty</option>
                </select>
            </div>

            <div id="student-fields" style="display: block;">
                <div class="form-group-clean">
                    <input type="text" id="rollNumber" placeholder="Roll Number (e.g. 21CS001)">
                </div>
                <div class="form-group-clean">
                    <input type="text" id="department" placeholder="Department (e.g. Computer Science)">
                </div>
            </div>

            <div id="faculty-fields" style="display: none;">
                <div class="form-group-clean">
                    <input type="text" id="facultyId" placeholder="Faculty ID (e.g. FAC001)">
                </div>
            </div>

            <!-- Hidden username field (auto-generated or strictly email based for now) -->
            <!-- For simplicity in this design, we can use email as username or auto-derive it -->
            <input type="hidden" id="username" value="">

            <div class="form-row">
                <div class="form-group-clean half">
                    <input type="password" id="password" placeholder="Password" required minlength="6">
                </div>
                <div class="form-group-clean half">
                    <input type="password" id="confirm-password" placeholder="Confirm" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-black">
                Create account <i class="ri-arrow-right-line"></i>
            </button>
        </form>

        <div class="auth-footer-clean">
            Have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Simple script to auto-fill hidden username from email prefix
        document.getElementById('email').addEventListener('input', (e) => {
            const email = e.target.value;
            const username = email.split('@')[0];
            document.getElementById('username').value = username;
        });

        // Toggle Role Fields
        const roleSelect = document.getElementById('role');
        const studentFields = document.getElementById('student-fields');
        const facultyFields = document.getElementById('faculty-fields');

        if (roleSelect) {
            roleSelect.addEventListener('change', () => {
                const selectedRole = roleSelect.value;
                if (selectedRole === 'STUDENT') {
                    studentFields.style.display = 'block';
                    facultyFields.style.display = 'none';
                } else {
                    studentFields.style.display = 'none';
                    facultyFields.style.display = 'block';
                }
            });
        }

        // Handle Form Submission
        const signupForm = document.getElementById('signup-form');
        if (signupForm) {
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }

                const userData = {
                    fullname: document.getElementById('fullname').value,
                    email: document.getElementById('email').value,
                    username: document.getElementById('username').value,
                    password: password,
                    role: roleSelect.value
                };

                if (userData.role === 'STUDENT') {
                    userData.rollNumber = document.getElementById('rollNumber').value;
                    userData.department = document.getElementById('department').value;
                } else if (userData.role === 'FACULTY') {
                    userData.facultyId = document.getElementById('facultyId').value;
                }

                try {
                    const response = await api.register(userData.fullname, userData.username, userData.email, userData.password, userData.role, userData.rollNumber, userData.department, userData.facultyId);
                    // Instead of redirecting to login, show the approval message
                    document.querySelector('.auth-card-clean').innerHTML = `
                        <div class="auth-header-clean" style="text-align: center;">
                            <div style="width: 64px; height: 64px; background: rgba(0, 255, 127, 0.1); color: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2rem;">
                                <i class="ri-checkbox-circle-line"></i>
                            </div>
                            <h1 class="auth-title-clean">Registration Sent</h1>
                            <p style="color: var(--text-muted); margin-top: 1rem;">
                                Your user registration request has been sent to the Administrator for approval.
                            </p>
                            <div style="margin-top: 2rem;">
                                <a href="login.html" class="btn-black" style="display: inline-block; padding: 0.75rem 2rem;">Return to Login</a>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    alert('Registration failed: ' + error.message);
                }
            });
        }
    </script>
</body>

</html>
