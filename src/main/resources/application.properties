server.port=8082
spring.application.name=archivehub
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.level.org.springframework=INFO
logging.level.com.archivehub=DEBUG
logging.file.name=app.log

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/archivehub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Madhan@2005

# Hibernate (Creates/Updates tables automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
